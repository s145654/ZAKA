<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback | ZAKA</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="styles.css" rel="stylesheet">
</head>

<body>
    <header>
        <nav class="navbar navbar-expand-lg navbar-dark sticky-top py-3">
            <div class="container">
                <a class="navbar-brand" href="index.html">
                    <img src="logo.png" alt="ZAKA Logo" width="60" height="60" class="me-2">
                </a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                        <li class="nav-item"><a class="nav-link" href="about.html">About Us</a></li>
                        <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
                        <li class="nav-item"><a class="nav-link" href="developer.html">Dev Portal</a></li>
                        <li class="nav-item"><a class="nav-link" href="store.html">Store</a></li>
                        <li class="nav-item"><a class="nav-link active" href="questionnaire.html">Feedback</a></li>
                        <li class="nav-item"><a class="nav-link" href="calculate.html">Calculator</a></li>
                        <li class="nav-item"><a class="nav-link" href="funpage.html">Fun Page</a></li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <main class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card p-4 border-secondary shadow">
                    <h2 class="text-center mb-1">Player Experience Questionnaire</h2>
                    <p class="text-center text-white-50 mb-4">
                        We value your feedback! Help us improve the ZAKA platform.
                    </p>

                    <!-- Questionnaire Form -->
                    <!-- onsubmit calls validateQuestionnaire() in scripts.js for custom JS validation -->
                    <form id="feedback-form" onsubmit="validateQuestionnaire(event)" novalidate>

                        <!-- ===== CONTROL 1: Email (Text Input) ===== -->
                        <!-- Validated with regex: must be a proper email format -->
                        <div class="mb-3">
                            <label for="q-email" class="form-label">Email Address <span
                                    class="text-danger">*</span></label>
                            <input type="email" id="q-email" class="form-control" placeholder="example@domain.com">
                            <!-- Bootstrap invalid-feedback div shows the JS error message -->
                            <div id="q-email-feedback" class="invalid-feedback"></div>
                        </div>

                        <!-- ===== CONTROL 2: Username (Text Input) ===== -->
                        <!-- Validated with regex: 3-20 chars, letters/numbers/underscores only -->
                        <div class="mb-3">
                            <label for="q-username" class="form-label">ZAKA Username <span
                                    class="text-danger">*</span></label>
                            <input type="text" id="q-username" class="form-control"
                                placeholder="Your in-game username (e.g. ZakaPlayer99)">
                            <div class="form-text text-white-50">3-20 characters, letters, numbers and underscores only.
                            </div>
                            <div id="q-username-feedback" class="invalid-feedback"></div>
                        </div>

                        <!-- ===== CONTROL 3: Age (Number Input) ===== -->
                        <!-- Validated: must be a number between 13 and 99 -->
                        <div class="mb-3">
                            <label for="q-age" class="form-label">Your Age <span class="text-danger">*</span></label>
                            <input type="number" id="q-age" class="form-control" placeholder="Enter your age (13-99)">
                            <div id="q-age-feedback" class="invalid-feedback"></div>
                        </div>

                        <!-- ===== CONTROL 4: Radio Buttons ===== -->
                        <!-- Asking for overall experience rating -->
                        <div class="mb-3">
                            <label class="form-label d-block">Overall Platform Experience</label>
                            <div class="d-flex flex-wrap gap-3">
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" name="experience" id="exp1"
                                        value="excellent" checked>
                                    <label class="form-check-label" for="exp1">Excellent</label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" name="experience" id="exp2"
                                        value="good">
                                    <label class="form-check-label" for="exp2">Good</label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" name="experience" id="exp3"
                                        value="average">
                                    <label class="form-check-label" for="exp3">Average</label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" name="experience" id="exp4"
                                        value="poor">
                                    <label class="form-check-label" for="exp4">Poor</label>
                                </div>
                            </div>
                        </div>

                        <!-- ===== CONTROL 5: Checkboxes ===== -->
                        <!-- Asking which game genres they prefer -->
                        <div class="mb-3">
                            <label class="form-label d-block">Favorite Game Genres (select all that apply)</label>
                            <div class="row">
                                <div class="col-6">
                                    <div class="form-check">
                                        <input class="form-check-input" type="checkbox" value="rpg" id="genre1">
                                        <label class="form-check-label" for="genre1">RPG</label>
                                    </div>
                                    <div class="form-check">
                                        <input class="form-check-input" type="checkbox" value="fps" id="genre2">
                                        <label class="form-check-label" for="genre2">FPS</label>
                                    </div>
                                    <div class="form-check">
                                        <input class="form-check-input" type="checkbox" value="sandbox" id="genre3">
                                        <label class="form-check-label" for="genre3">Sandbox</label>
                                    </div>
                                </div>
                                <div class="col-6">
                                    <div class="form-check">
                                        <input class="form-check-input" type="checkbox" value="br" id="genre4">
                                        <label class="form-check-label" for="genre4">Battle Royale</label>
                                    </div>
                                    <div class="form-check">
                                        <input class="form-check-input" type="checkbox" value="sports" id="genre5">
                                        <label class="form-check-label" for="genre5">Sports</label>
                                    </div>
                                    <div class="form-check">
                                        <input class="form-check-input" type="checkbox" value="strategy" id="genre6">
                                        <label class="form-check-label" for="genre6">Strategy</label>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- ===== CONTROL 6: Select Dropdown ===== -->
                        <!-- How did the user hear about ZAKA? -->
                        <div class="mb-3">
                            <label for="q-source" class="form-label">How did you hear about ZAKA?</label>
                            <select id="q-source" class="form-select">
                                <option value="">-- Please select --</option>
                                <option value="social">Social Media (Instagram / X)</option>
                                <option value="friend">Recommended by a Friend</option>
                                <option value="search">Online Search</option>
                                <option value="discord">Discord Community</option>
                                <option value="other">Other</option>
                            </select>
                        </div>

                        <!-- ===== CONTROL 7: Textarea ===== -->
                        <!-- Validated: must be at least 20 characters long -->
                        <div class="mb-4">
                            <label for="q-feedback" class="form-label">Detailed Feedback <span
                                    class="text-danger">*</span></label>
                            <textarea id="q-feedback" class="form-control" rows="4"
                                placeholder="Tell us what you liked, what can be improved, or any suggestions... (min 20 characters)"></textarea>
                            <div id="q-feedback-feedback" class="invalid-feedback"></div>
                        </div>

                        <button type="submit" class="btn btn-primary w-100 btn-lg">Submit Feedback</button>
                    </form>

                    <!-- Overall form submission status message -->
                    <!-- Set dynamically by validateQuestionnaire() in scripts.js -->
                    <div id="submission-status"></div>
                </div>
            </div>
        </div>
    </main>

    <footer id="main-footer">
        <div class="container text-center mb-5">
            <p>Email: ZAKAforGamers@gmail.com</p>
        </div>
        <div class="moving-banner">
            <p id="banner-text">Loading...</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="scripts.js"></script>
</body>

</html>
