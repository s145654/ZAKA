    <meta charset="UTF-8">

</head>
<body>

        <nav class="navbar navbar-expand-lg navbar-dark sticky-top py-3">
            <div class="container">
                <a class="navbar-brand" href="index.html">                    
                    <img src="logo.png" alt="ZAKA Logo" width="60" height="60" class="me-2">
                </a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                        <li class="nav-item"><a class="nav-link" href="about.html">About Us</a></li>
                        <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>

                </div>
            </div>
        </nav>
    </header>

    <main class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="glass-card">
                    <h2 class="text-center mb-4">Player Experience Questionnaire</h2>
                    <p class="text-center mb-4">We value your feedback to improve the ZAKA platform.</p>
                    
                    <form id="feedback-form" onsubmit="validateQuestionnaire(event)">
                        <!-- Control 1: Textbox (Email) -->
                        <div class="mb-3">
                            <label for="q-email" class="form-label">Email Address</label>
                            <input type="email" id="q-email" class="form-control" placeholder="example@domain.com" required>
                        </div>

                        <!-- Control 2: Textbox (Age) -->
                        <div class="mb-3">
                            <label for="q-age" class="form-label">Age</label>
                            <input type="number" id="q-age" class="form-control" placeholder="Enter your age" required>
                        </div>

                        <!-- Control 3: Radio Buttons -->
                        <div class="mb-3">
                            <label class="form-label d-block">Overall Experience</label>
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="radio" name="experience" id="exp1" value="excellent" checked>
                                <label class="form-check-label" for="exp1">Excellent</label>
                            </div>
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="radio" name="experience" id="exp2" value="good">
                                <label class="form-check-label" for="exp2">Good</label>
                            </div>
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="radio" name="experience" id="exp3" value="average">
                                <label class="form-check-label" for="exp3">Average</label>
                            </div>
                        </div>

                        <!-- Control 4: Checkboxes -->
                        <div class="mb-3">
                            <label class="form-label d-block">Favorite Genres</label>
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" value="rpg" id="genre1">
                                <label class="form-check-label" for="genre1">RPG</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" value="fps" id="genre2">
                                <label class="form-check-label" for="genre2">FPS</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" value="sandbox" id="genre3">
                                <label class="form-check-label" for="genre3">Sandbox</label>
                            </div>
                        </div>

                        <!-- Control 5: Text-area -->
                        <div class="mb-4">
                            <label for="q-feedback" class="form-label">Detailed Feedback</label>
                            <textarea id="q-feedback" class="form-control" rows="4" placeholder="Tell us more about your experience..."></textarea>
                        </div>

                        <button type="submit" class="btn-primary-zaka w-100">Submit Feedback</button>
                    </form>

                    <!-- Visual Feedback for Submission Status -->
                    <div id="submission-status"></div>
                </div>
            </div>
        </div>
    </main>

    <footer id="main-footer">
        <div class="container text-center">
            <p>Email: ZAKAforGamers@gmail.com</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="scripts.js"></script>
</body>
</html>
