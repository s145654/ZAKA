<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">
<html xmlns="http://www.w3.org/1999/xhtml" lang="en">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Contact ZAKA support and inquiry team." />
    <title>Contact Us | ZAKA</title>




    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="styles.css" rel="stylesheet" />
</head>
<body>
    <header>
        <nav class="navbar navbar-expand-lg navbar-dark py-3">
            <div class="container">
                <a class="navbar-brand" href="index.html">                    
                    <img src="logo.png" alt="ZAKA Logo" width="60" height="60" class="me-2">
                </a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item"><a class="nav-link active" href="index.html">Home</a></li>
                        <li class="nav-item"><a class="nav-link" href="about.html">About Us</a></li>
                        <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
                        <li class="nav-item"><a class="nav-link" href="developer.html">Dev Portal</a></li>
                        <li class="nav-item"><a class="nav-link" href="store.html">Store</a></li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <main class="container py-5 text-center">
        <h1>Reach the Nexus</h1>
        <p>Do you have questions about our platform? Our automated assistant and human support team are standing by.</p>
        
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="glass-card text-start">



                    
                    <form action="https://httpbin.org/get" method="get">
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label for="full-name" class="form-label">Full Name:</label>
                                <input type="text" id="full-name" name="full-name" class="form-control" placeholder="Adnan Gamez" />
                            </div>
                            <div class="col-md-6">
                                <label for="contact-email" class="form-label">Email Address:</label>
                                <input type="email" id="contact-email" name="contact-email" class="form-control" required="required" />
                            </div>
                        </div>
                        <div class="mb-3">
                            <label for="department" class="form-label">Department:</label>
                            <select id="department" name="department" class="form-control">
                                <option value="support">Technical Support</option>
                                <option value="billing">Billing Inquiry</option>
                                <option value="partnership">Legal &amp; Partnership</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Inquiry Type:</label>
                            <br />
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="radio" name="inquiryType" id="type-q" value="question" checked="checked" />
                                <label class="form-check-label" for="type-q">Question</label>
                            </div>
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="radio" name="inquiryType" id="type-bg" value="bug" />
                                <label class="form-check-label" for="type-bg">Bug Report</label>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label for="message" class="form-label">Message Details:</label>
                            <textarea id="message" name="message" class="form-control" rows="5"></textarea>
                        </div>
                        <div class="mb-3 form-check">
                            <input type="checkbox" id="urgent" name="urgent" class="form-check-input" />
                            <label class="form-check-label" for="urgent">Mark as Urgent</label>
                        </div>
                        <button type="submit" class="btn-primary-zaka w-100">Broadcast Message</button>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <footer id="main-footer">
        <div class="container text-center">
        <p>Email:ZAKAforGamers@gmail.com<br>instagram:zakagg<br>X: zaka.gg<br>Discord: ZAKA Community</p>
        </div>
    </footer>
</body>
</html>
