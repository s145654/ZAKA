<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | ZAKA</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="styles.css" rel="stylesheet">
</head>

<body>
    <header>
        <nav class="navbar navbar-expand-lg navbar-dark sticky-top py-3">
            <div class="container">
                <a class="navbar-brand" href="index.html">
                    <img src="logo.png" alt="ZAKA Logo" width="60" height="60" class="me-2">
                </a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                        <li class="nav-item"><a class="nav-link" href="about.html">About Us</a></li>
                        <li class="nav-item"><a class="nav-link active" href="contact.html">Contact</a></li>
                        <li class="nav-item"><a class="nav-link" href="developer.html">Dev Portal</a></li>
                        <li class="nav-item"><a class="nav-link" href="store.html">Store</a></li>
                        <li class="nav-item"><a class="nav-link" href="questionnaire.html">Feedback</a></li>
                        <li class="nav-item"><a class="nav-link" href="calculate.html">Calculator</a></li>
                        <li class="nav-item"><a class="nav-link" href="funpage.html">Fun Page</a></li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <main class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card p-4 border-secondary shadow">
                    <h2 class="text-center mb-4">Contact Support</h2>
                    <form action="https://httpbin.org/get" method="get">
                        <div class="mb-3">
                            <label for="name" class="form-label">Name:</label>
                            <input type="text" id="name" name="name" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label for="email" class="form-label">Email:</label>
                            <input type="email" id="email" name="email" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label for="subject" class="form-label">Subject:</label>
                            <select id="subject" name="subject" class="form-select">
                                <option value="support">Technical Support</option>
                                <option value="billing">Billing Inquiry</option>
                                <option value="partnership">Partnership</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label for="message" class="form-label">Message:</label>
                            <textarea id="message" name="message" class="form-control" rows="4" required></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Send Message</button>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <footer id="main-footer">
        <div class="container text-center">
            <p>Email: ZAKAforGamers@gmail.com<br>Instagram: zakagg<br>X: zaka.gg<br>Discord: ZAKA Community</p>
        </div>
        <div class="moving-banner">
            <p id="banner-text">Loading...</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="scripts.js"></script>
</body>

</html>
