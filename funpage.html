<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fun Page | ZAKA</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="styles.css" rel="stylesheet">
    <style>
        #fun-canvas {
            background-color: #fff;
            border: 5px solid var(--zaka-light-blue);
            border-radius: 10px;
            cursor: crosshair;
            width: 100%;
            height: 400px;
        }
        .canvas-container {
            position: relative;
        }
    </style>
</head>
<body>
    <header>
        <nav class="navbar navbar-expand-lg navbar-dark sticky-top py-3">
            <div class="container">
                <a class="navbar-brand" href="index.html">                    
                    <img src="logo.png" alt="ZAKA Logo" width="60" height="60" class="me-2">
                </a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                        <li class="nav-item"><a class="nav-link" href="about.html">About Us</a></li>
                        <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
                        <li class="nav-item"><a class="nav-link" href="developer.html">Dev Portal</a></li>
                        <li class="nav-item"><a class="nav-link" href="store.html">Store</a></li>
                        <li class="nav-item"><a class="nav-link" href="table_pages.html">Data Hub</a></li>
                        <li class="nav-item"><a class="nav-link" href="questionnaire.html">Feedback</a></li>
                        <li class="nav-item"><a class="nav-link" href="calculate.html">Calculator</a></li>
                        <li class="nav-item"><a class="nav-link active" href="funpage.html">Fun Page</a></li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <main class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-10">
                <div class="glass-card text-center">
                    <h2 class="mb-4">ZAKA Creative Zone</h2>
                    <p class="mb-4">Unleash your creativity! Use our interactive drawing tool to sketch your next game character idea.</p>
                    
                    <div class="row mb-3">
                        <div class="col-md-4 offset-md-4">
                            <label for="color-picker" class="form-label">Pick Your Color:</label>
                            <input type="color" id="color-picker" class="form-control form-control-color w-100" value="#156AF2">
                        </div>
                    </div>

                    <div class="canvas-container mb-4">
                        <canvas id="fun-canvas" width="800" height="400"></canvas>
                    </div>

                    <div class="d-flex justify-content-center gap-3">
                        <button onclick="clearCanvas()" class="btn btn-outline-danger px-5">Clear Canvas</button>
                        <button onclick="window.print()" class="btn btn-outline-info px-5">Save Sketch</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer id="main-footer">
        <div class="container text-center">
            <p>Email: ZAKAforGamers@gmail.com</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="scripts.js"></script>
</body>
</html>
