<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bill Calculator | ZAKA</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="styles.css" rel="stylesheet">
</head>
<body>
    <header>
        <nav class="navbar navbar-expand-lg navbar-dark sticky-top py-3">
            <div class="container">
                <a class="navbar-brand" href="index.html">                    
                    <img src="logo.png" alt="ZAKA Logo" width="60" height="60" class="me-2">
                </a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                        <li class="nav-item"><a class="nav-link" href="about.html">About Us</a></li>
                        <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
                        <li class="nav-item"><a class="nav-link" href="developer.html">Dev Portal</a></li>
                        <li class="nav-item"><a class="nav-link" href="store.html">Store</a></li>
                        <li class="nav-item"><a class="nav-link" href="questionnaire.html">Feedback</a></li>
                        <li class="nav-item"><a class="nav-link active" href="calculate.html">Calculator</a></li>
                        <li class="nav-item"><a class="nav-link" href="funpage.html">Fun Page</a></li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <main class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="glass-card">
                    <h2 class="text-center mb-4">ZAKA Store Bill Calculator</h2>
                    <p class="text-center mb-4">Calculate your total purchase including special discounts.</p>
                    
                    <form onsubmit="calculateBill(event)">
                        <div class="mb-3">
                            <label for="item-price" class="form-label">Item Price ($)</label>
                            <input type="number" id="item-price" class="form-control" step="0.01" min="0" placeholder="e.g. 59.99" required>
                        </div>

                        <div class="mb-3">
                            <label for="item-qty" class="form-label">Quantity</label>
                            <input type="number" id="item-qty" class="form-control" min="1" value="1" required>
                        </div>

                        <div class="mb-4">
                            <label for="user-age" class="form-label">Your Age</label>
                            <input type="number" id="user-age" class="form-control" min="1" placeholder="Enter your age for discounts" required>
                            <small class="text-info">10% discount for customers aged 60+!</small>
                        </div>

                        <button type="submit" class="btn-primary-zaka w-100">Calculate Total</button>
                    </form>

                    <!-- Result Section -->
                    <div id="calc-result"></div>
                </div>
            </div>
        </div>
    </main>

    <footer id="main-footer">
        <div class="container text-center">
            <p>Email: ZAKAforGamers@gmail.com</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="scripts.js"></script>
</body>
</html>
